name: Xcode Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build with Xcode
      run: |
        xcodebuild -workspace ios/Notesie.xcworkspace \
          -scheme Notesie \
          -configuration Release \
          -derivedDataPath build
